name: Holiday Sync

on:
  schedule:
    # 每周一 02:00 UTC（北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: holiday-sync
  cancel-in-progress: false

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Sync official holiday data
        id: sync
        run: node scripts/sync-holidays-auto.mjs

      - name: Verify after sync
        if: steps.sync.outputs.changed == 'true'
        run: pnpm run test:coverage

      - name: Bump minor version and push tag
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/holidays src/data/holiday-registry.ts
          pnpm version minor -m "chore(holidays): sync official calendar data (${{ steps.sync.outputs.changed_years }})"
          git push origin HEAD --follow-tags
